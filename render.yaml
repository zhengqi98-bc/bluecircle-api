services:
  - type: web
    name: bluecircle-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://YOUR_DOMAIN.com
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: bluecircle-db
    plan: free
