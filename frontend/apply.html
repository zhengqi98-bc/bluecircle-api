<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Circle — 设备申请</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#e0e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a3a5c,#0d2847);padding:1.5rem 2rem;text-align:center;border-bottom:3px solid #2d8cf0}
.header h1{color:#fff;font-size:1.5rem}.header p{color:#6b9fd4;font-size:.9rem;margin-top:.3rem}
.container{max-width:700px;margin:2rem auto;padding:0 1rem}
.card{background:#0f1f38;border:1px solid #1a3050;border-radius:12px;padding:2rem;margin-bottom:1.5rem}
.card h2{color:#2d8cf0;font-size:1.1rem;margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:1px solid #1a3050}
.form-row{display:flex;gap:1rem;margin-bottom:1rem}
.form-group{flex:1;margin-bottom:1rem}
.form-group label{display:block;font-size:.85rem;color:#6b9fd4;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.7rem;background:#0a1628;border:1px solid #1a3050;border-radius:6px;color:#e0e8f0;font-size:.9rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2d8cf0}
.form-group textarea{resize:vertical;min-height:100px}
.required:after{content:' *';color:#f06060}
.btn{display:block;width:100%;padding:.8rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#2d8cf0;color:#fff}.btn-primary:hover{background:#1a6fd4}
.btn-secondary{background:rgba(45,140,240,.15);color:#2d8cf0;border:1px solid rgba(45,140,240,.3)}
.toast{position:fixed;top:1rem;right:1rem;padding:.8rem 1.2rem;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast-success{background:#065f46;color:#6ee7b7}.toast-error{background:#7f1d1d;color:#fca5a5}
footer{text-align:center;padding:2rem;color:#4a6a8a;font-size:.8rem}
footer a{color:#2d8cf0;text-decoration:none}
</style>
</head>
<body>
<div class="header">
<h1>🐢 Blue Circle 设备申请</h1>
<p>申请追踪设备，参与海龟保护研究</p>
</div>
<div class="container">
<div class="card">
<h2>📋 申请人信息</h2>
<div class="form-row">
<div class="form-group"><label class="required">姓名</label><input type="text" id="name" placeholder="您的姓名"></div>
<div class="form-group"><label class="required">邮箱</label><input type="email" id="email" placeholder="your@email.com"></div>
</div>
<div class="form-row">
<div class="form-group"><label class="required">机构</label><input type="text" id="institution" placeholder="所属研究机构或组织"></div>
<div class="form-group"><label>电话</label><input type="text" id="phone" placeholder="可选"></div>
</div>
</div>
<div class="card">
<h2>🔬 项目信息</h2>
<div class="form-group"><label class="required">项目标题</label><input type="text" id="project_title" placeholder="如：南海绿海龟迁徙追踪研究"></div>
<div class="form-group"><label class="required">项目描述</label><textarea id="project_description" placeholder="请简要描述您的研究目标和方法..."></textarea></div>
<div class="form-row">
<div class="form-group"><label class="required">目标物种</label><input type="text" id="species" placeholder="如：绿海龟、棱皮龟"></div>
<div class="form-group"><label class="required">目标数量</label><input type="number" id="target_count" value="1" min="1" max="50"></div>
</div>
<div class="form-row">
<div class="form-group"><label class="required">研究区域</label><input type="text" id="region" placeholder="如：南中国海、西沙群岛"></div>
<div class="form-group"><label>坐标（纬度,经度）</label><input type="text" id="coords" placeholder="如：16.5,112.0（可选）"></div>
</div>
</div>
<div class="card">
<h2>📡 设备需求</h2>
<div class="form-row">
<div class="form-group"><label class="required">设备类型</label>
<select id="device_type">
<option value="gps_tag">GPS 追踪标签</option>
<option value="satellite_tag">卫星追踪标签</option>
<option value="depth_sensor">深度传感器</option>
<option value="temp_sensor">水温传感器</option>
<option value="camera_tag">摄像标签</option>
</select></div>
<div class="form-group"><label class="required">数量</label><input type="number" id="quantity" value="1" min="1" max="100"></div>
</div>
<div class="form-row">
<div class="form-group"><label>计划开始日期</label><input type="date" id="start_date"></div>
<div class="form-group"><label>计划结束日期</label><input type="date" id="end_date"></div>
</div>
</div>
<button class="btn btn-primary" onclick="submitApp()" id="submit-btn">📨 提交申请</button>
<p style="text-align:center;margin-top:1rem;color:#4a6a8a;font-size:.85rem">提交后将由管理员审核，通过后会通过邮件通知您</p>
</div>
<div class="toast" id="toast"></div>
<footer>Blue Circle 海龟追踪平台 · <a href="/">返回主页</a> · <a href="admin.html">管理后台</a></footer>
<script>
function toast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;
  t.className='toast '+(type==='error'?'toast-error':'toast-success')+' show';
  setTimeout(function(){t.className='toast'},4000);
}
async function submitApp(){
  var btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='提交中...';
  var coords=document.getElementById('coords').value.split(',');
  var data={
    applicant_name:document.getElementById('name').value.trim(),
    email:document.getElementById('email').value.trim(),
    institution:document.getElementById('institution').value.trim(),
    phone:document.getElementById('phone').value.trim()||null,
    project_title:document.getElementById('project_title').value.trim(),
    project_description:document.getElementById('project_description').value.trim(),
    target_species:document.getElementById('species').value.trim(),
    target_count:parseInt(document.getElementById('target_count').value)||1,
    region:document.getElementById('region').value.trim(),
    latitude:coords[0]?parseFloat(coords[0]):null,
    longitude:coords[1]?parseFloat(coords[1]):null,
    device_type:document.getElementById('device_type').value,
    quantity:parseInt(document.getElementById('quantity').value)||1,
    start_date:document.getElementById('start_date').value||null,
    end_date:document.getElementById('end_date').value||null
  };
  if(!data.applicant_name||!data.email||!data.institution||!data.project_title||!data.project_description||!data.target_species||!data.region){
    toast('请填写所有必填字段','error');btn.disabled=false;btn.textContent='📨 提交申请';return
  }
  try{
    var r=await fetch('/api/v1/hardware/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(r.status===201){toast('✅ 申请已提交！请留意邮箱通知','success');document.querySelectorAll('input,textarea,select').forEach(function(e){if(e.type!=='number')e.value='';else e.value='1'})}
    else{var b=await r.json();toast('提交失败: '+(b.detail||r.status),'error')}
  }catch(e){toast('网络错误，请重试','error')}
  btn.disabled=false;btn.textContent='📨 提交申请';
}
</script>
</body>
</html>
